name: nanonmesh
description: "AI-Powered Multilateral Agricultural Barter & Credit Exchange Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  uuid: ^4.2.0
  intl: ^0.20.0
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.0
  image_picker: ^1.1.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  crypto: ^3.0.3
  pin_code_fields: ^8.0.1
  provider: ^6.1.1
  shared_preferences: ^2.3.0
  animate_do: ^3.3.4
  percent_indicator: ^4.2.3
  flutter_staggered_animations: ^1.1.1
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.5
  http: ^1.6.0
  image: ^4.5.2
  flutter_local_notifications: ^18.0.1
  share_plus: ^10.1.4
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
