<!DOCTYPE html>
<html>
<head>
    <title>Smart Agricultural Barter System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌾 Smart Agricultural Barter System</h1>

    <div class="container">

        <!-- Farmer Registration -->
        <div class="card">
            <h2>Register Farmer</h2>
            <input type="text" id="farmerName" placeholder="Farmer Name">
            <input type="text" id="farmerLocation" placeholder="Location">
            <button onclick="createFarmer()">Register</button>
        </div>

        <!-- Create Listing -->
        <div class="card">
            <h2>Add Listing</h2>
            <input type="text" id="title" placeholder="Title">
            <input type="text" id="description" placeholder="Description">
            <input type="text" id="category" placeholder="Category (produce/labor/equipment)">
            <input type="number" id="value" placeholder="Estimated Value">
            <input type="number" id="ownerId" placeholder="Owner ID">
            <button onclick="createListing()">Add Listing</button>
        </div>

        <!-- View Listings -->
        <div class="card">
            <h2>Available Listings</h2>
            <button onclick="loadListings()">Load Listings</button>
            <ul id="listingList"></ul>
        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
